# Release pipeline — triggered by pushing a version tag (e.g. v0.2.0).
#
# Flow:
#   1. Tag push  →  builds native installer on Windows, macOS (arm64 + x64), Linux
#   2. Uploads artefacts to a draft GitHub Release
#   3. You review the draft, then publish manually
#
# Platforms produced:
#   Windows   →  .msi + .exe (NSIS) installer
#   macOS     →  .dmg (universal via separate arm64 / x64 jobs)
#   Linux     →  .AppImage + .deb
#
# ── Prerequisites ─────────────────────────────────────────────────────────────
# 1. Push a semver tag:
#      git tag v0.2.0 && git push origin v0.2.0
#
# 2. The version in src-tauri/tauri.conf.json and src-tauri/Cargo.toml must
#    match the tag (without the leading 'v'). Update them before tagging.
#
# 3. Icons: replace src-tauri/icons/icon.png (512×512) and icon.ico before
#    cutting a real release — the current placeholders are tiny stubs.
#
# 4. Code signing (optional but recommended):
#    Windows  →  add TAURI_SIGNING_PRIVATE_KEY + TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#                to repo secrets, then configure windows.certificateThumbprint in
#                tauri.conf.json for Authenticode signing.
#    macOS    →  add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#                APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD,
#                APPLE_TEAM_ID for notarisation.
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'       # v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'     # v1.2.3-beta.1
  workflow_dispatch:                    # allow manual trigger from Actions UI
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0)'
        required: true

jobs:
  build:
    name: build · ${{ matrix.label }}
    permissions:
      contents: write       # needed to create / update the GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────────────────
          - label: windows-x64
            os: windows-latest
            args: ''

          # ── macOS ARM (Apple Silicon) ───────────────────────────────────────
          - label: macos-arm64
            os: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin

          # ── macOS Intel ─────────────────────────────────────────────────────
          - label: macos-x64
            os: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin

          # ── Linux ──────────────────────────────────────────────────────────
          - label: linux-x64
            os: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Node (Tauri CLI is an npm dev-dep) ──────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target || '' }}

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-${{ matrix.label }}

      # ── Linux system deps ───────────────────────────────────────────────────
      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Node deps (Tauri CLI) ───────────────────────────────────────────────
      - name: npm ci
        run: npm ci

      # ── Build + publish ─────────────────────────────────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment and add secrets for code signing:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name || inputs.tag }}
          releaseName: 'omp-desktop ${{ github.ref_name || inputs.tag }}'
          releaseBody: |
            ## omp-desktop ${{ github.ref_name || inputs.tag }}

            ### Installation
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` (recommended) or `.exe` (NSIS) |
            | macOS    | `.dmg` |
            | Linux    | `.AppImage` or `.deb` |

            **Windows:** if SmartScreen blocks the installer, click _More info → Run anyway_.
            This will resolve once the app is code-signed.

            ### Requirements
            - [oh-my-pi](https://github.com/can1357/oh-my-pi) (`omp`) must be installed
              and available on your `PATH`.
          releaseDraft: true        # publish manually after reviewing artefacts
          prerelease: ${{ contains(github.ref_name || inputs.tag, '-') }}
          args: ${{ matrix.args }}
