<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OMP Desktop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />


  <!-- Design tokens — copied into src/design/ -->
  <link rel="stylesheet" href="design/styles.css" />
  <link rel="stylesheet" href="design/layout.css" />
  <link rel="stylesheet" href="platform.css" />

  <!-- Syntax highlighting theme (atom-one-dark) -->
  <link rel="stylesheet" href="highlight-theme.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel — served locally, no CDN dependency -->
  <script src="react.development.js"></script>
  <script src="react-dom.development.js"></script>
  <script src="babel.min.js"></script>

  <!-- Markdown + syntax highlighting — must load before design components -->
  <script src="marked.min.js"></script>
  <script src="highlight.min.js"></script>
  <script>
    // Wire marked v12 to use highlight.js for code blocks.
    // Runs after DOMContentLoaded so both libs are parsed.
    (function () {
      if (!window.marked || !window.hljs) return;
      window.marked.use({
        renderer: {
          code(text, lang) {
            const code     = text ?? '';
            const language = (lang ?? '').split(/\s/)[0];
            let highlighted;
            try {
              highlighted = language && hljs.getLanguage(language)
                ? hljs.highlight(code, { language }).value
                : hljs.highlightAuto(code).value;
            } catch (_) {
              highlighted = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            }
            const cls = language ? ' language-' + language : '';
            return '<pre class="code-block"><code class="hljs' + cls + '">' +
                   highlighted + '</code></pre>';
          }
        }
      });
    })();
  </script>

  <!-- Design components (unchanged — from src/design/ copy) -->
  <script src="design/tweaks/style.js"></script>
  <script src="design/tweaks/use-tweaks.js"></script>
  <script type="text/babel" src="design/tweaks/panel.jsx"></script>
  <script type="text/babel" src="design/tweaks/controls.jsx"></script>
  <script type="text/babel" src="design/ui/icons.jsx"></script>
  <script type="text/babel" src="design/ui/sparks.jsx"></script>
  <script type="text/babel" src="design/ui/markdown.jsx"></script>
  <script type="text/babel" src="design/ui/plan-annotations.jsx"></script>
  <script type="text/babel" src="design/chat/user-bubble.jsx"></script>
  <script type="text/babel" src="design/chat/eval-cell.jsx"></script>
  <script type="text/babel" src="design/chat/assistant-bubble.jsx"></script>
  <script type="text/babel" src="design/chat/tool-card.jsx"></script>
  <script type="text/babel" src="design/chat/ask-bubble.jsx"></script>
  <script type="text/babel" src="design/chat/chat-view.jsx"></script>
  <script type="text/babel" src="design/composer.jsx"></script>
  <script type="text/babel" src="design/chrome.jsx"></script>
  <script type="text/babel" src="design/panels.jsx"></script>

  <!-- Live data layer (must load before app-live.jsx) -->
  <script src="model-names.js"></script>
  <script src="adapter.js"></script>
  <script src="live.js"></script>

  <!-- App root — wired to OMP_BRIDGE, no demo effects -->
  <!-- App constants + cross-cutting hooks (must load before app-live.jsx) -->
  <script src="app/constants.js"></script>
  <script type="text/babel" src="app/use-bridge-snapshot.jsx"></script>

  <script type="text/babel" src="app-live.jsx"></script>
</body>
</html>
